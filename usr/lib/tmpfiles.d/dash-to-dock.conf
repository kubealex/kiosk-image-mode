# Provision the dash-to-dock GNOME extension into the 'redhat' user's profile
# at first boot. The source lives under /usr/share to survive ostree updates.
#
# Type C: copy if the destination does not already exist
# Path:   target location in the user's GNOME extensions directory
# Mode/UID/GID: - means inherit defaults
# Age:    - means no cleanup
# Source: /usr/share/dash-to-dock (populated at image build time)

d  /var/home/redhat/.local                                                                        0755  redhat  redhat  -  -
d  /var/home/redhat/.local/share                                                                  0755  redhat  redhat  -  -
d  /var/home/redhat/.local/share/gnome-shell                                                      0755  redhat  redhat  -  -
d  /var/home/redhat/.local/share/gnome-shell/extensions                                           0755  redhat  redhat  -  -
C  "/var/home/redhat/.local/share/gnome-shell/extensions/dash-to-dock@micxgx.gmail.com"            0755  redhat  redhat  -  /usr/share/dash-to-dock
